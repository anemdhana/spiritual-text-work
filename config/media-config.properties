# ─── Tools & Directories ─────────────────────────────────────────────────────
# Directory containing yt-dlp.exe, ffmpeg.exe, ffprobe.exe
tools_dir=C:\Users\dhana\pssm-music-playlist-tools

# Directory where downloaded/processed media files are saved
media_dir=${user.home}\media-files

# ─── Input ───────────────────────────────────────────────────────────────────
# YouTube video ID (used by yt_download_audio.py)
videoId=

# Quality preset for yt_download_audio.py
# COMPACT_SIZE | COMPACT_SIZE_SPEECH | COMPACT_SIZE_MUSIC |
# COMPACT_MUSIC_INSTRUMENTAL | WHATSAPP | MUSIC_CONCERT | YOUTUBE_UPLOAD
quality=COMPACT_SIZE_SPEECH

# Output format for yt_download_audio.py: m4a or mp3
output_format=m4a

# Optional: trim the downloaded audio to this range before transcribing
# Format: HH:MM:SS or HH:MM:SS.mmm  (leave blank to skip trimming)
startTime=
endTime=

# Local audio input for yt_transcribe.py (required unless passed on CLI)
# audio_file=C:\Users\dhana\media-files\my_audio.m4a
audio_file=

# ─── Audio Quality (COMPACT_SIZE_SPEECH) ─────────────────────────────────────
# Matches MediaFileUtils.audioCodecOptionsFor(COMPACT_SIZE_SPEECH)
# aac codec · 48k bitrate · 32000 Hz sample rate · mono channel
audio_codec=-c:a aac -b:a 48k -ar 32000 -ac 1

# ─── Transcription ────────────────────────────────────────────────────────────
# Whisper model size: tiny | base | small | medium | large-v3
model=medium

# Language code(s): en, te, hi, auto  (comma-separated for mixed, e.g. te,en)
lang=te,en

# Fallback speaker label used when no speaker is detected in the segment
speaker=Speaker 1

# ─── Output ───────────────────────────────────────────────────────────────────
# Suffix appended to the output transcript filename stem
output_suffix=.transcript
