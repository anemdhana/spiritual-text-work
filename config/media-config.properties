# ─── Tools & Directories ─────────────────────────────────────────────────────
# Directory containing yt-dlp.exe, ffmpeg.exe, ffprobe.exe
tools_dir=C:\Users\dhana\pssm-music-playlist-tools

# Directory where downloaded/processed media files are saved
media_dir=${user.home}\media-files

# ─── Input ───────────────────────────────────────────────────────────────────
# YouTube video ID (used by yt_download_audio.py)
videoId=n9T2dhIV0EQ

# Quality preset for yt_download_audio.py
# COMPACT_SIZE | COMPACT_SIZE_SPEECH | COMPACT_SIZE_MUSIC |
# COMPACT_MUSIC_INSTRUMENTAL | WHATSAPP | MUSIC_CONCERT | YOUTUBE_UPLOAD
quality=COMPACT_SIZE_SPEECH

# Output format for yt_download_audio.py: m4a or mp3
output_format=m4a

# Optional: trim the downloaded audio to this range before transcribing
# Format: HH:MM:SS or HH:MM:SS.mmm  (leave blank to skip trimming)
startTime=00:00:00
endTime=00:52:53

# Local audio input for yt_transcribe.py (required unless passed on CLI)
# audio_file=C:\Users\dhana\media-files\my_audio.m4a
audio_file="C:\Users\dhana\media-files\Master Minood on Silence, Surrender & the Power of Breath. @gulnarvirk @MasterMinood-compact_size_speech.m4a"

# ─── Audio Quality (COMPACT_SIZE_SPEECH) ─────────────────────────────────────
# Matches MediaFileUtils.audioCodecOptionsFor(COMPACT_SIZE_SPEECH)
# aac codec · 48k bitrate · 32000 Hz sample rate · mono channel
audio_codec=-c:a aac -b:a 48k -ar 32000 -ac 1

# ─── Transcription ────────────────────────────────────────────────────────────
# Whisper model size: tiny | base | small | medium | large-v3
model=medium

# Language code(s): en, te, hi, auto  (comma-separated for mixed, e.g. te,en)
lang=en,hi

# Fallback speaker label used when no speaker is detected in the segment
speaker=Master Minood

# ─── Output ───────────────────────────────────────────────────────────────────
# Suffix appended to the output transcript filename stem
output_suffix=.transcript

# ─── Markdown Translation (translate_markdown.py) ────────────────────────────
# Input markdown file to translate (required)
# input_md_file=C:\Users\dhana\media-files\my_book.md
input_md_file=

# Azure Translator configuration
# Use environment-backed placeholder if preferred, for example:
# translator_api_key=${AZURE_TRANSLATOR_KEY}
translator_api_key=${AZURE_TRANSLATOR_KEY}
# Optional explicit env var name fallback used by translate_markdown.py
translator_api_key_env=AZURE_TRANSLATOR_KEY
translator_region=centralindia
translator_endpoint=https://api.cognitive.microsofttranslator.com

# Source and target languages
# translator_from=auto or language code such as en, te, hi
translator_from=en
# Comma-separated target languages. Output file is suffixed per language.
# Example: hi  -> book_hi.md
# Example: hi,te -> book_hi.md and book_te.md
translator_to=hi

# HTTP timeout in seconds for translator calls
translator_timeout_s=60

# ─── Azure Speech Transcription (azure_transcribe.py) ───────────────────────
# Azure Speech key can be supplied directly or through environment variable.
# Example PowerShell:
#   $env:AZURE_SPEECH_KEY="<your-key>"
azure_speech_key=${AZURE_SPEECH_KEY}
azure_speech_key_env=AZURE_SPEECH_KEY
azure_speech_region=centralindia

# Azure Speech locale for regional language transcription.
# Telugu locale: te-IN
azure_speech_lang=te-IN

# Suffix appended to Azure transcript filename stem
azure_output_suffix=.azure.transcript
